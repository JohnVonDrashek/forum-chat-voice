global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: forumline-api
    static_configs:
      - targets: ["192.168.1.99:3000"]
        labels:
          host: forumline-prod

  - job_name: hosted
    static_configs:
      - targets: ["192.168.1.107:3000"]
        labels:
          host: hosted-prod
