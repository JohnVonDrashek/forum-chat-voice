# Enable health API for Docker healthcheck
[api]
enabled = true
address = "0.0.0.0:8686"

# Collect logs from all Docker containers
[sources.docker]
type = "docker_logs"

# Add host label — replaced by deploy script per host
[transforms.add_host]
type = "remap"
inputs = ["docker"]
source = '''
.host = "${LOGS_HOST_LABEL}"
.container = replace(string!(.container_name), "/", "")
'''

# Emit internal metrics for monitoring Vector health
[sources.internal]
type = "internal_metrics"

# Tag metrics with host label (substituted by deploy script)
[transforms.tag_metrics]
type = "remap"
inputs = ["internal"]
source = '''
.tags.host = "${LOGS_HOST_LABEL}"
'''

# Push Vector's own metrics to VictoriaMetrics
[sinks.metrics]
type = "prometheus_remote_write"
inputs = ["tag_metrics"]
endpoint = "http://192.168.1.108:8428/api/v1/write"
default_namespace = "vector"

# Ship to VictoriaLogs (Loki-compatible endpoint)
[sinks.victorialogs]
type = "loki"
inputs = ["add_host"]
endpoint = "http://192.168.1.108:9428/insert"
encoding.codec = "text"

[sinks.victorialogs.labels]
host = "{{ host }}"
container = "{{ container }}"
