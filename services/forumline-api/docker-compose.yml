# Local dev stack — Postgres + NATS + Valkey.
# Zitadel runs separately: cd ../zitadel && docker compose up -d
services:
  db:
    image: postgres:17-alpine
    ports:
      - "${FORUMLINE_PG_PORT:-5433}:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  hasura:
    image: hasura/graphql-engine:v2.44.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: "postgres://postgres:postgres@db:5432/postgres"
      HASURA_GRAPHQL_ADMIN_SECRET: "local-dev-admin"
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"RS256","jwk_url":"https://auth.forumline.net/oauth/v2/keys","claims_namespace":"https://hasura.io/jwt/claims","claims_format":"json","audience":"forumline"}'
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup, http-log, webhook-log, websocket-log"
    ports:
      - "8080:8080"

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "${FORUMLINE_VALKEY_PORT:-6379}:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
