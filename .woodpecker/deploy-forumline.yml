when:
  - event: push
    branch: main
    path:
      include:
        - "services/forumline-api/**"
        - "services/forumline-web/**"
        - "packages/**"
        - "pnpm-lock.yaml"
        - "deploy/docker/Dockerfile.go-forumline"
        - "deploy/compose/forumline/**"
        - "deploy/secrets.kdbx"
  - event: manual

steps:
  - name: deploy
    image: bash
    environment:
      KEEPASS_PASSWORD:
        from_secret: keepass_password
    commands:
      - ci/deploy.sh forumline
