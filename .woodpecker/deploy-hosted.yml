when:
  - event: push
    branch: main
    path:
      include:
        - "services/hosted/**"
        - "packages/shared-go/**"
        - "deploy/docker/Dockerfile.go-hosted"
        - "deploy/compose/hosted/**"
        - "deploy/secrets.kdbx"
  - event: manual

steps:
  - name: deploy
    image: bash
    environment:
      KEEPASS_PASSWORD:
        from_secret: keepass_password
    commands:
      - ci/deploy.sh hosted
