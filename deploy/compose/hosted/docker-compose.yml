services:
  postgres:
    image: citusdata/citus:13.0
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: postgres
    volumes:
      - /opt/hosted/postgres-data:/var/lib/postgresql/data
      - /opt/hosted/repo/services/hosted/init-platform.sql:/docker-entrypoint-initdb.d/00-init-platform.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"

  hosted:
    build:
      context: /opt/hosted/repo
      dockerfile: deploy/docker/Dockerfile.go-hosted
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file: .env
    environment:
      VALKEY_URL: "valkey:6379"
    ports:
      - "3000:3000"
