services:
  postgres:
    image: citusdata/citus:13.0
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: postgres
    volumes:
      - /opt/hosted/postgres-data:/var/lib/postgresql/data
      - /opt/hosted/repo/services/hosted/init-platform.sql:/docker-entrypoint-initdb.d/00-init-platform.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  hosted:
    build:
      context: /opt/hosted/repo
      dockerfile: deploy/docker/Dockerfile.go-hosted
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "3000:3000"
