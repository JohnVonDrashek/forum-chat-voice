services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - /opt/auth/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d zitadel -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zitadel

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.11.0
    command: start-from-init --masterkey ${ZITADEL_MASTERKEY}
    user: "0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    ports:
      - "8080:8080"
    networks:
      - zitadel

  forumline-id:
    build:
      context: /opt/auth/repo
      dockerfile: deploy/docker/Dockerfile.go-id
    restart: unless-stopped
    depends_on:
      zitadel:
        condition: service_healthy
    env_file: .env
    environment:
      ZITADEL_URL: "https://auth.forumline.net"
      EXTERNAL_URL: "https://id.forumline.net"
    ports:
      - "3000:3000"
    networks:
      - zitadel

networks:
  zitadel:

volumes:
  zitadel-bootstrap:
