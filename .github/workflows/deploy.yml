name: Deploy

on:
  workflow_call:
    inputs:
      project-id:
        required: true
        type: string
      working-directory:
        required: true
        type: string
      packages-to-build:
        required: true
        type: string
        description: 'Space-separated list of workspace packages to build (e.g. "packages/protocol packages/server-sdk")'
      sync-commands:
        required: true
        type: string
        description: 'Shell commands to sync built packages into the app node_modules'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      VERCEL_ORG_ID: team_v8Ej4FlhSEJtk4zdtTWiwTPE
      VERCEL_PROJECT_ID: ${{ inputs.project-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Install workspace packages (for building from source)
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build monorepo packages from source
        run: |
          for pkg in ${{ inputs.packages-to-build }}; do
            npm run --workspace="$pkg" build
          done

      - name: Install app dependencies
        run: npm ci
        working-directory: ${{ inputs.working-directory }}
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync built packages into app node_modules
        run: ${{ inputs.sync-commands }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: ${{ inputs.working-directory }}

      - name: Build
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: ${{ inputs.working-directory }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: ${{ inputs.working-directory }}
