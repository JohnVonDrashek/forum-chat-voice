name: Deploy

on:
  workflow_call:
    inputs:
      project-id:
        required: true
        type: string
      working-directory:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      VERCEL_ORG_ID: team_v8Ej4FlhSEJtk4zdtTWiwTPE
      VERCEL_PROJECT_ID: ${{ inputs.project-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Install all dependencies
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: npx turbo run build --filter=./${{ inputs.working-directory }}...

      - name: Link workspace packages into app node_modules
        run: |
          # npm hoists workspace symlinks to root node_modules/ but leaves empty
          # @johnvondrashek/ dirs in app node_modules/, blocking Node.js resolution.
          # Create symlinks so Vercel's nft bundler can find the packages.
          for pkg in packages/*/; do
            name=$(node -p "require('./$pkg/package.json').name.replace('@johnvondrashek/', '')")
            target="${{ inputs.working-directory }}/node_modules/@johnvondrashek/$name"
            rm -rf "$target"
            ln -s "$(pwd)/$pkg" "$target"
          done
          ls -la ${{ inputs.working-directory }}/node_modules/@johnvondrashek/

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }} --cwd ${{ inputs.working-directory }}

      - name: Configure monorepo root for Vercel
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('${{ inputs.working-directory }}/.vercel/project.json', 'utf8'));
            p.settings.rootDirectory = '${{ inputs.working-directory }}';
            fs.writeFileSync('${{ inputs.working-directory }}/.vercel/project.json', JSON.stringify(p, null, 2));
          "
          mv ${{ inputs.working-directory }}/.vercel .vercel

      - name: Build for Vercel
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
