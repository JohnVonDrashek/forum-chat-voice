name: Terraform Plan

on:
  pull_request:
    paths:
      - 'deploy/terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  pull-requests: write

jobs:
  plan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenTofu
        run: |
          if ! command -v tofu &>/dev/null; then
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sudo bash -s -- --install-method standalone --opentofu-version 1.11.5
          fi

      - name: Run OpenTofu plan
        id: plan
        working-directory: deploy/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_VAR_state_encryption_passphrase: ${{ secrets.TF_STATE_ENCRYPTION_PASSPHRASE }}
        run: |
          tofu init
          tofu plan -var-file=prod.tfvars -no-color 2>&1 | tee /tmp/tofu-plan.txt

      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/tofu-plan.txt', 'utf8').substring(0, 60000);
            const body = `### OpenTofu Plan\n\n\`\`\`\n${plan}\n\`\`\`\n\n*Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### OpenTofu Plan'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
