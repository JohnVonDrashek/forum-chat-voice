name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/website/**'
      - 'deploy/docker/Dockerfile.website'
      - '.github/workflows/deploy-website.yml'
      - 'deploy/compose/website/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Upload compose file
        run: scp deploy/compose/website/docker-compose.yml website-prod:/opt/website/docker-compose.yml

      - name: Pull latest code
        run: ssh website-prod "cd /opt/website/repo && git fetch origin main && git reset --hard origin/main"

      - name: Rebuild and restart
        run: ssh website-prod "cd /opt/website && docker compose up -d --build website && docker compose ps"
