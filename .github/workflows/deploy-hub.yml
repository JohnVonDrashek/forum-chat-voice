name: Deploy Forumline Central Services

on:
  push:
    branches: [main]
    paths:
      - 'central-services/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_v8Ej4FlhSEJtk4zdtTWiwTPE
      VERCEL_PROJECT_ID: prj_bIR1T3sDDe3bhKQjLHH7WGlXuKCu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy to production
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: central-services
