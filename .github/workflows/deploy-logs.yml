name: Deploy Logs (VictoriaLogs)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/logs/server/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Deploy VictoriaLogs
        run: ci/deploy.sh logs
        env:
          KEEPASS_PASSWORD: ${{ secrets.KEEPASS_PASSWORD }}
