name: Deploy Logs (Central)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/logs/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Upload compose file
        run: scp deploy/compose/logs/docker-compose.yml logs-prod:/opt/logs/docker-compose.yml

      - name: Restart
        run: |
          ssh logs-prod "cd /opt/logs && docker compose pull && docker compose up -d --remove-orphans && docker compose ps"
