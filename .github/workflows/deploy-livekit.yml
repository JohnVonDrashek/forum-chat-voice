name: Deploy LiveKit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/livekit/**'
      - 'secrets.kdbx'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: ci/deploy.sh livekit
        env:
          KEEPASS_PASSWORD: ${{ secrets.KEEPASS_PASSWORD }}
