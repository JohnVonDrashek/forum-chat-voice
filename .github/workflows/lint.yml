name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: npx lefthook run pre-commit --all-files --no-tty
