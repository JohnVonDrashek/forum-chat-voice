name: Deploy Forumline Central Services

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/forumline-api/**'
      - 'services/forumline-web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'deploy/docker/Dockerfile.go-forumline'
      - 'deploy/compose/forumline/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Decrypt and upload env
        run: |
          SOPS_AGE_KEY="${{ secrets.SOPS_AGE_KEY }}" sops -d --input-type dotenv --output-type dotenv deploy/compose/forumline/.env.enc > /tmp/forumline.env
          scp /tmp/forumline.env forumline-prod:/opt/forumline/.env
          rm -f /tmp/forumline.env

      - name: Upload compose file
        run: scp deploy/compose/forumline/docker-compose.yml forumline-prod:/opt/forumline/docker-compose.yml

      - name: Pull latest code
        run: ssh forumline-prod "cd /opt/forumline/repo && git fetch origin main && git reset --hard origin/main"

      - name: Run migrations
        run: |
          ssh forumline-prod 'cd /opt/forumline && for f in repo/services/forumline-api/migrations/*.sql; do echo "Applying migration: $f" && docker compose exec -T postgres psql -U postgres -d postgres < "$f"; done'

      - name: Rebuild and restart
        run: ssh forumline-prod "cd /opt/forumline && docker compose up -d --build forumline && docker compose ps"
