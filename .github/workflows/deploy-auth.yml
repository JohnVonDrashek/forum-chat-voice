name: Deploy Auth (Zitadel + Identity Service)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/auth/**'
      - 'deploy/docker/Dockerfile.go-id'
      - 'services/forumline-id/**'
      - 'packages/backend/**'
      - 'secrets.kdbx'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: ci/deploy.sh auth
        env:
          KEEPASS_PASSWORD: ${{ secrets.KEEPASS_PASSWORD }}
